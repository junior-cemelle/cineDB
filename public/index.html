<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CineDB</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:         #141414;
      --bg-card:    #1f1f1f;
      --bg-nav:     rgba(14, 14, 14, 0.97);
      --red:        #e50914;
      --red-dark:   #b20710;
      --gold:       #f5c518;
      --text:       #e5e5e5;
      --muted:      #888;
      --border:     rgba(255,255,255,0.08);
      --radius:     8px;
      --transition: 0.25s ease;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0e0e0e; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #555; }

    /* ── Navbar ── */
    nav {
      position: fixed;
      inset: 0 0 auto 0;
      z-index: 100;
      height: 68px;
      background: var(--bg-nav);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      padding: 0 2.5rem;
      gap: 1.5rem;
    }

    .logo {
      font-size: 1.75rem;
      font-weight: 900;
      color: var(--red);
      letter-spacing: -1.5px;
      flex-shrink: 0;
      user-select: none;
    }
    .logo span { color: var(--text); font-weight: 300; }

    .search-box {
      flex: 1;
      max-width: 480px;
      position: relative;
    }
    .search-box svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
      transition: color var(--transition);
    }
    .search-box:focus-within svg { color: var(--text); }

    #searchInput {
      width: 100%;
      background: rgba(255,255,255,0.07);
      border: 1.5px solid rgba(255,255,255,0.12);
      border-radius: 30px;
      color: var(--text);
      padding: 10px 16px 10px 44px;
      font-size: 0.92rem;
      outline: none;
      transition: background var(--transition), border-color var(--transition);
    }
    #searchInput:focus {
      background: rgba(255,255,255,0.11);
      border-color: rgba(255,255,255,0.28);
    }
    #searchInput::placeholder { color: var(--muted); }

    #clearBtn {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 1.1rem;
      line-height: 1;
      display: none;
      transition: color var(--transition);
    }
    #clearBtn:hover { color: var(--text); }
    #clearBtn.visible { display: block; }

    .nav-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .btn-login {
      background: transparent;
      border: 1.5px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.35);
      padding: 8px 22px;
      border-radius: var(--radius);
      font-size: 0.88rem;
      cursor: not-allowed;
      letter-spacing: 0.3px;
      position: relative;
    }
    .btn-login::after {
      content: 'Próximamente';
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%);
      background: #333;
      color: var(--text);
      font-size: 0.72rem;
      padding: 4px 10px;
      border-radius: 4px;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity var(--transition);
    }
    .btn-login:hover::after { opacity: 1; }

    /* ── Main ── */
    main { padding: 88px 2.5rem 4rem; }

    .section-header {
      display: flex;
      align-items: baseline;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    .section-title {
      font-size: 0.78rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--muted);
    }
    .section-count {
      font-size: 0.78rem;
      color: rgba(255,255,255,0.25);
    }

    /* ── Grid ── */
    .movies-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(158px, 1fr));
      gap: 14px;
    }

    /* ── Card ── */
    .movie-card {
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      position: relative;
      aspect-ratio: 2/3;
      background: var(--bg-card);
      transition: transform 0.3s cubic-bezier(.25,.8,.25,1),
                  box-shadow 0.3s cubic-bezier(.25,.8,.25,1);
    }
    .movie-card:hover {
      transform: scale(1.06) translateY(-4px);
      box-shadow: 0 24px 48px rgba(0,0,0,0.7);
      z-index: 2;
    }

    /* poster container — fills the card; badge + overlay sit on top */
    .card-poster {
      position: absolute;
      inset: 0;
    }
    .card-poster img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .no-poster {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #242424;
      gap: 0.5rem;
      padding: 1rem;
      text-align: center;
    }
    .no-poster svg { opacity: 0.25; }
    .no-poster span { font-size: 0.72rem; color: var(--muted); }

    .card-badge {
      position: absolute;
      top: 8px;
      right: 8px;
      z-index: 2;
      background: rgba(0,0,0,0.72);
      backdrop-filter: blur(4px);
      color: #ddd;
      font-size: 0.68rem;
      font-weight: 600;
      padding: 3px 7px;
      border-radius: 4px;
      letter-spacing: 0.3px;
    }

    .card-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 2;
      background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.4) 60%, transparent 100%);
      padding: 2.5rem 0.85rem 0.85rem;
      transform: translateY(8px);
      opacity: 0;
      transition: opacity 0.3s ease, transform 0.3s ease;
    }
    .movie-card:hover .card-overlay {
      opacity: 1;
      transform: translateY(0);
    }
    .card-title {
      font-size: 0.82rem;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 3px;
    }
    .card-year {
      font-size: 0.72rem;
      color: rgba(255,255,255,0.6);
    }

    /* ── Skeleton ── */
    .skeleton {
      border-radius: var(--radius);
      aspect-ratio: 2/3;
      background: linear-gradient(90deg, #1e1e1e 25%, #282828 50%, #1e1e1e 75%);
      background-size: 200% 100%;
      animation: shimmer 1.6s infinite;
    }
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* ── Empty / Error ── */
    .state-box {
      grid-column: 1 / -1;
      text-align: center;
      padding: 6rem 1rem;
      color: var(--muted);
    }
    .state-box svg { opacity: 0.2; margin-bottom: 1.2rem; display: block; margin-inline: auto; }
    .state-box h3 { font-size: 1.15rem; color: var(--text); margin-bottom: 0.4rem; }
    .state-box p  { font-size: 0.88rem; line-height: 1.6; }

    /* ── Pagination ── */
    .pagination {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-top: 3.5rem;
    }

    .page-btn {
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      color: var(--text);
      min-width: 38px;
      height: 38px;
      padding: 0 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.88rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: background var(--transition), border-color var(--transition), color var(--transition);
    }
    .page-btn:hover:not(:disabled):not(.active) {
      background: rgba(255,255,255,0.13);
      border-color: rgba(255,255,255,0.2);
    }
    .page-btn.active {
      background: var(--red);
      border-color: var(--red);
      font-weight: 700;
      color: #fff;
    }
    .page-btn:disabled { opacity: 0.25; cursor: not-allowed; }
    .page-dots { color: var(--muted); font-size: 0.9rem; padding: 0 4px; }

    /* ── Modal backdrop ── */
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.82);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      backdrop-filter: blur(6px);
    }
    .modal-backdrop.open {
      display: flex;
      animation: bdFade 0.2s ease;
    }
    @keyframes bdFade { from { opacity: 0; } to { opacity: 1; } }

    /* ── Modal box ── */
    .modal-box {
      background: #1a1a1a;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 14px;
      max-width: 820px;
      width: 100%;
      max-height: 88vh;
      overflow-y: auto;
      position: relative;
      animation: boxUp 0.28s cubic-bezier(.25,.8,.25,1);
    }
    @keyframes boxUp {
      from { transform: translateY(28px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    .modal-close {
      position: absolute;
      top: 14px;
      right: 14px;
      z-index: 10;
      background: rgba(0,0,0,0.55);
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--text);
      width: 34px;
      height: 34px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background var(--transition), border-color var(--transition);
    }
    .modal-close:hover {
      background: var(--red);
      border-color: var(--red);
    }

    /* ── Modal content ── */
    .modal-grid {
      display: grid;
      grid-template-columns: 210px 1fr;
    }

    .modal-poster-wrap {
      position: relative;
    }
    .modal-poster-wrap img {
      width: 100%;
      aspect-ratio: 2/3;
      object-fit: cover;
      display: block;
      border-radius: 14px 0 0 14px;
    }
    .modal-poster-wrap .no-poster {
      aspect-ratio: 2/3;
      border-radius: 14px 0 0 14px;
    }
    .modal-poster-wrap .poster-type-tag {
      position: absolute;
      bottom: 12px;
      left: 12px;
      background: var(--red);
      color: #fff;
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 3px 9px;
      border-radius: 4px;
    }

    .modal-info {
      padding: 1.75rem 1.75rem 1.75rem 1.6rem;
      display: flex;
      flex-direction: column;
      gap: 1.1rem;
      overflow: hidden;
    }

    .modal-title {
      font-size: 1.5rem;
      font-weight: 800;
      line-height: 1.2;
      padding-right: 2rem;
    }

    .modal-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .tag {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 5px;
      padding: 3px 10px;
      font-size: 0.78rem;
      color: #bbb;
    }
    .tag.red { background: rgba(229,9,20,0.15); border-color: rgba(229,9,20,0.35); color: #ff6b74; }

    .modal-imdb {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--gold);
    }
    .modal-imdb small {
      font-weight: 400;
      color: var(--muted);
      font-size: 0.82rem;
    }

    .modal-plot {
      font-size: 0.9rem;
      line-height: 1.65;
      color: #c8c8c8;
    }

    .sep { border: none; border-top: 1px solid var(--border); }

    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.85rem 1.2rem;
    }
    .detail-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--muted);
      margin-bottom: 3px;
    }
    .detail-value {
      font-size: 0.86rem;
      color: var(--text);
      line-height: 1.4;
    }
    .detail-full { grid-column: 1 / -1; }

    .ratings-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .rating-pill {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 14px;
      text-align: center;
      min-width: 90px;
    }
    .rp-source { font-size: 0.68rem; color: var(--muted); margin-bottom: 4px; }
    .rp-value  { font-size: 0.98rem; font-weight: 700; }

    /* ── Modal loading ── */
    .modal-loading {
      padding: 5rem 2rem;
      text-align: center;
      color: var(--muted);
    }
    .spinner {
      width: 38px;
      height: 38px;
      border: 3px solid rgba(255,255,255,0.08);
      border-top-color: var(--red);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Responsive ── */
    @media (max-width: 640px) {
      nav { padding: 0 1rem; gap: 0.75rem; }
      main { padding: 80px 1rem 3rem; }
      .btn-login { display: none; }

      .modal-grid { grid-template-columns: 1fr; }
      .modal-poster-wrap img,
      .modal-poster-wrap .no-poster {
        border-radius: 14px 14px 0 0;
        aspect-ratio: 16/9;
      }
    }
  </style>
</head>
<body>

<!-- ── Navbar ── -->
<nav>
  <div class="logo">Cine<span>DB</span></div>

  <div class="search-box">
    <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input id="searchInput" type="text" placeholder="Buscar películas..." autocomplete="off" spellcheck="false">
    <button id="clearBtn" title="Limpiar">✕</button>
  </div>

  <div class="nav-right">
    <button class="btn-login">Iniciar sesión</button>
  </div>
</nav>

<!-- ── Main content ── -->
<main>
  <div class="section-header">
    <span class="section-title" id="sectionTitle">Películas populares</span>
    <span class="section-count" id="sectionCount"></span>
  </div>
  <div class="movies-grid" id="moviesGrid"></div>
  <div class="pagination"   id="pagination"></div>
</main>

<!-- ── Detail modal ── -->
<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal-box" id="modalBox">
    <button class="modal-close" id="modalClose" title="Cerrar">✕</button>
    <div id="modalContent"></div>
  </div>
</div>

<script>
  const API = '/api';
  const PER_PAGE = 10; // matches server SEARCH_PAGE_SIZE

  let state = { query: 'the', page: 1, total: 0 };
  let debounceTimer = null;

  // ── Utility ────────────────────────────────────────────────────────────────
  const $id = id => document.getElementById(id);

  function esc(str) {
    return String(str ?? '')
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function orDash(v) { return (!v || v === 'N/A') ? '—' : v; }

  function noPosterHtml(extraClass = '') {
    return `<div class="no-poster ${extraClass}">
      <svg width="36" height="36" fill="none" stroke="currentColor" stroke-width="1.4" viewBox="0 0 24 24">
        <rect x="2" y="3" width="20" height="14" rx="2"/>
        <path d="m8 21 4-4 4 4M12 17v4"/>
      </svg>
      <span>Sin póster</span>
    </div>`;
  }

  // Replaces only the poster container, not badge/overlay siblings
  function handlePosterError(el) {
    el.parentElement.innerHTML = noPosterHtml();
  }

  // ── Card builder ───────────────────────────────────────────────────────────
  function buildCard(m) {
    const poster = (m.Poster && m.Poster !== 'N/A')
      ? `<img src="${esc(m.Poster)}" alt="${esc(m.Title)}" loading="lazy" onerror="handlePosterError(this)">`
      : noPosterHtml();

    return `
      <div class="movie-card" onclick="openDetail('${esc(m.imdbID)}')">
        <div class="card-poster">${poster}</div>
        <span class="card-badge">${esc(m.Year)}</span>
        <div class="card-overlay">
          <div class="card-title">${esc(m.Title)}</div>
          <div class="card-year">${esc(m.Year)}</div>
        </div>
      </div>`;
  }

  // ── Load movies ────────────────────────────────────────────────────────────
  async function loadMovies(query, page) {
    const grid = $id('moviesGrid');
    const pag  = $id('pagination');

    grid.innerHTML = Array(PER_PAGE).fill('<div class="skeleton"></div>').join('');
    pag.innerHTML  = '';
    $id('sectionCount').textContent = '';

    try {
      const res  = await fetch(`${API}/?s=${encodeURIComponent(query)}&page=${page}`);
      const data = await res.json();

      if (data.Response === 'False') {
        grid.innerHTML = `
          <div class="state-box">
            <svg width="52" height="52" fill="none" stroke="currentColor" stroke-width="1.4" viewBox="0 0 24 24">
              <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
            </svg>
            <h3>Sin resultados</h3>
            <p>No encontramos películas para &ldquo;<strong>${esc(query)}</strong>&rdquo;.<br>
               Intenta con otro término de búsqueda.</p>
          </div>`;
        return;
      }

      state.total = parseInt(data.totalResults, 10) || 0;
      const totalPages = Math.ceil(state.total / PER_PAGE);

      grid.innerHTML = data.Search.map(buildCard).join('');

      $id('sectionTitle').textContent =
        query === 'the' ? 'Películas populares' : `Resultados para "${query}"`;
      $id('sectionCount').textContent =
        `${state.total.toLocaleString('es-ES')} película${state.total !== 1 ? 's' : ''}`;

      renderPagination(page, totalPages);

    } catch {
      grid.innerHTML = `
        <div class="state-box">
          <svg width="52" height="52" fill="none" stroke="currentColor" stroke-width="1.4" viewBox="0 0 24 24">
            <path d="M12 9v4m0 4h.01M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
          </svg>
          <h3>Error de conexión</h3>
          <p>No se pudo conectar con la API.<br>
             Asegúrate de que el servidor esté corriendo en el puerto 8089.</p>
        </div>`;
    }
  }

  // ── Pagination ─────────────────────────────────────────────────────────────
  function renderPagination(current, total) {
    if (total <= 1) { $id('pagination').innerHTML = ''; return; }

    const range = buildPageRange(current, total);
    let html = '';

    html += btn('&lsaquo;', current - 1, current === 1);
    for (const p of range) {
      if (p === '…') {
        html += `<span class="page-dots">…</span>`;
      } else {
        html += `<button class="page-btn${p === current ? ' active' : ''}"
          onclick="goPage(${p})">${p}</button>`;
      }
    }
    html += btn('&rsaquo;', current + 1, current === total);

    $id('pagination').innerHTML = html;
  }

  function btn(label, page, disabled) {
    return `<button class="page-btn" ${disabled ? 'disabled' : `onclick="goPage(${page})"`}>${label}</button>`;
  }

  function buildPageRange(cur, total) {
    if (total <= 7) return Array.from({ length: total }, (_, i) => i + 1);
    const set = new Set([1, total, cur, cur - 1, cur + 1].filter(p => p >= 1 && p <= total));
    const sorted = [...set].sort((a, b) => a - b);
    const result = [];
    for (let i = 0; i < sorted.length; i++) {
      if (i > 0 && sorted[i] - sorted[i - 1] > 1) result.push('…');
      result.push(sorted[i]);
    }
    return result;
  }

  function goPage(page) {
    state.page = page;
    loadMovies(state.query, page);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  // ── Detail modal ───────────────────────────────────────────────────────────
  async function openDetail(imdbId) {
    const backdrop = $id('modalBackdrop');
    backdrop.classList.add('open');
    document.body.style.overflow = 'hidden';

    $id('modalContent').innerHTML = `
      <div class="modal-loading">
        <div class="spinner"></div>
        <p>Cargando película…</p>
      </div>`;

    try {
      const res = await fetch(`${API}/?i=${encodeURIComponent(imdbId)}`);
      const m   = await res.json();

      if (m.Response === 'False') {
        $id('modalContent').innerHTML = `
          <div class="modal-loading"><p>No se pudo cargar la información.</p></div>`;
        return;
      }

      const hasPoster = m.Poster && m.Poster !== 'N/A';
      const posterHtml = hasPoster
        ? `<img src="${esc(m.Poster)}" alt="${esc(m.Title)}" onerror="handlePosterError(this)">`
        : noPosterHtml();

      const ratingPills = (m.Ratings || []).map(r => `
        <div class="rating-pill">
          <div class="rp-source">${esc(r.Source)}</div>
          <div class="rp-value">${esc(r.Value)}</div>
        </div>`).join('');

      const boxOffice = (m.BoxOffice && m.BoxOffice !== 'N/A')
        ? `<div><div class="detail-label">Taquilla</div><div class="detail-value">${esc(m.BoxOffice)}</div></div>` : '';
      const awards = (m.Awards && m.Awards !== 'N/A')
        ? `<div class="detail-full"><div class="detail-label">Premios</div><div class="detail-value">${esc(m.Awards)}</div></div>` : '';

      $id('modalContent').innerHTML = `
        <div class="modal-grid">
          <div class="modal-poster-wrap">
            ${posterHtml}
            <span class="poster-type-tag">${esc(m.Type || 'movie')}</span>
          </div>

          <div class="modal-info">
            <div class="modal-title">${esc(m.Title)}</div>

            <div class="modal-meta">
              ${m.Rated && m.Rated !== 'N/A' ? `<span class="tag red">${esc(m.Rated)}</span>` : ''}
              ${m.Year    !== 'N/A' ? `<span class="tag">${esc(m.Year)}</span>`    : ''}
              ${m.Runtime !== 'N/A' ? `<span class="tag">${esc(m.Runtime)}</span>` : ''}
              ${m.Genre   !== 'N/A' ? `<span class="tag">${esc(m.Genre)}</span>`   : ''}
            </div>

            ${m.imdbRating && m.imdbRating !== 'N/A' ? `
            <div class="modal-imdb">
              <svg width="16" height="16" fill="var(--gold)" viewBox="0 0 24 24">
                <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
              </svg>
              ${esc(m.imdbRating)}&thinsp;/&thinsp;10
              <small>· ${esc(m.imdbVotes)} votos</small>
              ${m.Metascore && m.Metascore !== 'N/A'
                ? `<span class="tag" style="margin-left:4px">Metascore ${esc(m.Metascore)}</span>` : ''}
            </div>` : ''}

            <p class="modal-plot">${esc(m.Plot)}</p>

            <hr class="sep">

            <div class="detail-grid">
              <div><div class="detail-label">Director</div><div class="detail-value">${orDash(m.Director)}</div></div>
              <div><div class="detail-label">País</div><div class="detail-value">${orDash(m.Country)}</div></div>
              <div class="detail-full"><div class="detail-label">Reparto</div><div class="detail-value">${orDash(m.Actors)}</div></div>
              <div><div class="detail-label">Idioma</div><div class="detail-value">${orDash(m.Language)}</div></div>
              <div><div class="detail-label">Estreno</div><div class="detail-value">${orDash(m.Released)}</div></div>
              ${boxOffice}
              ${awards}
            </div>

            ${ratingPills ? `<hr class="sep"><div class="ratings-row">${ratingPills}</div>` : ''}
          </div>
        </div>`;

    } catch {
      $id('modalContent').innerHTML = `
        <div class="modal-loading"><p>Error al cargar la película.</p></div>`;
    }
  }

  function closeModal() {
    $id('modalBackdrop').classList.remove('open');
    document.body.style.overflow = '';
  }

  // ── Event listeners ────────────────────────────────────────────────────────
  $id('modalClose').addEventListener('click', closeModal);
  $id('modalBackdrop').addEventListener('click', e => {
    if (e.target === $id('modalBackdrop')) closeModal();
  });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
  });

  $id('searchInput').addEventListener('input', e => {
    const q = e.target.value.trim();
    $id('clearBtn').classList.toggle('visible', q.length > 0);
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(() => {
      state.query = q || 'the';
      state.page  = 1;
      loadMovies(state.query, 1);
    }, 380);
  });

  $id('clearBtn').addEventListener('click', () => {
    $id('searchInput').value = '';
    $id('clearBtn').classList.remove('visible');
    state.query = 'the';
    state.page  = 1;
    loadMovies('the', 1);
    $id('searchInput').focus();
  });

  // ── Init ───────────────────────────────────────────────────────────────────
  loadMovies('the', 1);
</script>
</body>
</html>
