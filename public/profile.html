<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CineDB — Mi perfil</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:       #141414;
      --bg-card:  #1c1c1c;
      --bg-nav:   rgba(14,14,14,0.97);
      --red:      #e50914;
      --text:     #e5e5e5;
      --muted:    #888;
      --border:   rgba(255,255,255,0.08);
      --input-bg: rgba(255,255,255,0.06);
      --radius:   10px;
      --tr:       0.22s ease;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0e0e0e; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

    /* ── Navbar ── */
    nav {
      position: fixed;
      inset: 0 0 auto 0;
      z-index: 100;
      height: 64px;
      background: var(--bg-nav);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      padding: 0 2.5rem;
      gap: 1.5rem;
    }
    .logo {
      font-size: 1.6rem;
      font-weight: 900;
      color: var(--red);
      letter-spacing: -1.5px;
      text-decoration: none;
    }
    .logo span { color: var(--text); font-weight: 300; }

    .nav-back {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      font-size: 0.88rem;
      text-decoration: none;
      transition: color var(--tr);
    }
    .nav-back:hover { color: var(--text); }

    .nav-right { margin-left: auto; }

    .btn-signout {
      background: transparent;
      border: 1px solid rgba(229,9,20,0.4);
      color: #ff6b74;
      padding: 7px 18px;
      border-radius: 6px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background var(--tr), border-color var(--tr);
    }
    .btn-signout:hover {
      background: rgba(229,9,20,0.15);
      border-color: rgba(229,9,20,0.7);
    }

    /* ── Page layout ── */
    main {
      padding: 88px 2rem 4rem;
      max-width: 680px;
      margin: 0 auto;
    }

    /* ── Profile header ── */
    .profile-header {
      display: flex;
      align-items: center;
      gap: 1.75rem;
      padding: 2rem;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 1.5rem;
      animation: fadeUp 0.3s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .avatar-wrap { position: relative; flex-shrink: 0; }

    .avatar {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid rgba(255,255,255,0.1);
      display: block;
    }
    .avatar-fallback {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      background: var(--red);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      font-weight: 700;
      border: 3px solid rgba(255,255,255,0.1);
    }
    .provider-badge {
      position: absolute;
      bottom: 0;
      right: 0;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 2px solid var(--bg-card);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.65rem;
    }
    .provider-badge.google  { background: #fff; }
    .provider-badge.github  { background: #24292e; border-color: #444; }

    .profile-meta h2 {
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .profile-meta p {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .member-since {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.3);
    }

    /* ── Edit card ── */
    .edit-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.75rem 2rem;
      animation: fadeUp 0.35s ease 0.05s both;
    }

    .card-title {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: var(--muted);
      margin-bottom: 1.4rem;
      font-weight: 600;
    }

    .field-group { display: flex; flex-direction: column; gap: 1.1rem; }

    .field label {
      display: block;
      font-size: 0.78rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 6px;
    }

    .field input {
      width: 100%;
      background: var(--input-bg);
      border: 1.5px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      padding: 10px 14px;
      font-size: 0.92rem;
      outline: none;
      transition: border-color var(--tr), background var(--tr);
    }
    .field input:focus {
      border-color: rgba(255,255,255,0.28);
      background: rgba(255,255,255,0.09);
    }
    .field input:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .field input::placeholder { color: var(--muted); }

    .field-hint {
      font-size: 0.74rem;
      color: rgba(255,255,255,0.25);
      margin-top: 4px;
    }

    /* Avatar preview */
    .avatar-preview-row {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-top: 8px;
    }
    #avatarPreview {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--border);
      display: none;
    }
    #avatarPreview.visible { display: block; }

    /* Separator */
    .sep {
      border: none;
      border-top: 1px solid var(--border);
      margin: 1.5rem 0;
    }

    /* Action row */
    .action-row {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      align-items: center;
    }

    .save-msg {
      font-size: 0.83rem;
      opacity: 0;
      transition: opacity 0.3s;
      margin-right: auto;
    }
    .save-msg.success { color: #4ade80; opacity: 1; }
    .save-msg.error   { color: #ff6b74; opacity: 1; }

    .btn-cancel {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 9px 20px;
      border-radius: 7px;
      font-size: 0.88rem;
      cursor: pointer;
      transition: border-color var(--tr), color var(--tr);
    }
    .btn-cancel:hover { border-color: rgba(255,255,255,0.25); color: var(--text); }

    .btn-save {
      background: var(--red);
      border: none;
      color: #fff;
      padding: 9px 24px;
      border-radius: 7px;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      transition: filter var(--tr);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .btn-save:hover:not(:disabled)  { filter: brightness(1.12); }
    .btn-save:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-spinner {
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    .saving .btn-spinner { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Skeleton ── */
    .skeleton-block {
      background: linear-gradient(90deg, #1e1e1e 25%, #282828 50%, #1e1e1e 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 6px;
    }
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
  </style>
</head>
<body>

<nav>
  <a class="logo" href="/">Cine<span>DB</span></a>
  <a class="nav-back" href="/">
    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24">
      <path d="m15 18-6-6 6-6"/>
    </svg>
    Volver al catálogo
  </a>
  <div class="nav-right">
    <button class="btn-signout" onclick="CINEDB.signOut()">Cerrar sesión</button>
  </div>
</nav>

<main id="main">
  <!-- Skeleton while loading -->
  <div class="profile-header">
    <div class="avatar-fallback skeleton-block" style="background:none"></div>
    <div style="flex:1;display:flex;flex-direction:column;gap:10px">
      <div class="skeleton-block" style="height:20px;width:50%"></div>
      <div class="skeleton-block" style="height:14px;width:35%"></div>
    </div>
  </div>
  <div class="edit-card">
    <div style="display:flex;flex-direction:column;gap:16px">
      <div class="skeleton-block" style="height:42px"></div>
      <div class="skeleton-block" style="height:42px"></div>
      <div class="skeleton-block" style="height:42px"></div>
    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="/auth.js"></script>
<script>
  let currentSession = null;
  let originalData   = {};

  // ── Init ───────────────────────────────────────────────────────────────────
  (async () => {
    await CINEDB.init();
    currentSession = await CINEDB.requireAuth();
    if (!currentSession) return;
    await renderProfile();
  })();

  // ── Render ─────────────────────────────────────────────────────────────────
  async function renderProfile() {
    const user    = currentSession.user;
    const profile = await CINEDB.getProfile(user.id);

    const name      = profile?.full_name  || user.user_metadata?.full_name  || '';
    const username  = profile?.username   || '';
    const avatarUrl = profile?.avatar_url || user.user_metadata?.avatar_url || '';
    const email     = profile?.email      || user.email || '';
    const provider  = profile?.provider   || user.app_metadata?.provider    || '';
    const since     = user.created_at
      ? new Date(user.created_at).toLocaleDateString('es-ES', { year:'numeric', month:'long', day:'numeric' })
      : '';

    originalData = { name, username, avatarUrl };

    const providerBadge = provider === 'google'
      ? `<div class="provider-badge google">
           <svg width="12" height="12" viewBox="0 0 24 24">
             <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
             <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
             <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
             <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
           </svg>
         </div>`
      : provider === 'github'
      ? `<div class="provider-badge github">
           <svg width="11" height="11" viewBox="0 0 24 24" fill="white">
             <path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0 1 12 6.844a9.59 9.59 0 0 1 2.504.337c1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.02 10.02 0 0 0 22 12.017C22 6.484 17.522 2 12 2z"/>
           </svg>
         </div>`
      : '';

    const avatarHtml = avatarUrl
      ? `<img class="avatar" src="${esc(avatarUrl)}" alt="${esc(name)}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
        + `<div class="avatar-fallback" style="display:none">${(name || '?').charAt(0).toUpperCase()}</div>`
      : `<div class="avatar-fallback">${(name || '?').charAt(0).toUpperCase()}</div>`;

    document.getElementById('main').innerHTML = `
      <div class="profile-header">
        <div class="avatar-wrap">
          ${avatarHtml}
          ${providerBadge}
        </div>
        <div class="profile-meta">
          <h2 id="displayName">${esc(name || 'Sin nombre')}</h2>
          <p>${esc(email)}</p>
          ${since ? `<div class="member-since">Miembro desde ${since}</div>` : ''}
        </div>
      </div>

      <div class="edit-card">
        <div class="card-title">Editar perfil</div>
        <div class="field-group">

          <div class="field">
            <label for="inputName">Nombre completo</label>
            <input id="inputName" type="text" value="${esc(name)}" placeholder="Tu nombre completo">
          </div>

          <div class="field">
            <label for="inputUsername">Nombre de usuario</label>
            <input id="inputUsername" type="text" value="${esc(username)}" placeholder="@usuario">
          </div>

          <div class="field">
            <label for="inputEmail">Correo electrónico</label>
            <input id="inputEmail" type="email" value="${esc(email)}" disabled>
            <div class="field-hint">El correo se gestiona desde el proveedor de OAuth.</div>
          </div>

          <div class="field">
            <label for="inputAvatar">URL de imagen de perfil</label>
            <input id="inputAvatar" type="url" value="${esc(avatarUrl)}"
              placeholder="https://ejemplo.com/foto.jpg" oninput="previewAvatar(this.value)">
            <div class="avatar-preview-row">
              <img id="avatarPreview" src="${esc(avatarUrl)}" alt="Vista previa"
                class="${avatarUrl ? 'visible' : ''}"
                onerror="this.classList.remove('visible')">
              <span class="field-hint">Vista previa de la imagen</span>
            </div>
          </div>

        </div>

        <hr class="sep">

        <div class="action-row">
          <span class="save-msg" id="saveMsg"></span>
          <button class="btn-cancel" onclick="resetForm()">Cancelar</button>
          <button class="btn-save" id="btnSave" onclick="saveProfile()">
            <div class="btn-spinner"></div>
            Guardar cambios
          </button>
        </div>
      </div>`;
  }

  // ── Avatar preview ─────────────────────────────────────────────────────────
  function previewAvatar(url) {
    const img = document.getElementById('avatarPreview');
    if (!url) { img.classList.remove('visible'); return; }
    img.src = url;
    img.onload  = () => img.classList.add('visible');
    img.onerror = () => img.classList.remove('visible');
  }

  // ── Reset form ─────────────────────────────────────────────────────────────
  function resetForm() {
    document.getElementById('inputName').value     = originalData.name;
    document.getElementById('inputUsername').value = originalData.username;
    document.getElementById('inputAvatar').value   = originalData.avatarUrl;
    previewAvatar(originalData.avatarUrl);
    setMsg('', '');
  }

  // ── Save ───────────────────────────────────────────────────────────────────
  async function saveProfile() {
    const btn      = document.getElementById('btnSave');
    const newName  = document.getElementById('inputName').value.trim();
    const newUser  = document.getElementById('inputUsername').value.trim();
    const newAvatar = document.getElementById('inputAvatar').value.trim();

    btn.disabled = true;
    btn.classList.add('saving');
    setMsg('', '');

    try {
      const { error } = await CINEDB.updateProfile(currentSession.user.id, {
        full_name:  newName,
        username:   newUser  || null,
        avatar_url: newAvatar || null,
      });

      if (error) throw error;

      // Also update auth user metadata
      await CINEDB.client().auth.updateUser({
        data: { full_name: newName, avatar_url: newAvatar },
      });

      originalData = { name: newName, username: newUser, avatarUrl: newAvatar };
      document.getElementById('displayName').textContent = newName || 'Sin nombre';
      setMsg('Cambios guardados', 'success');

    } catch (e) {
      setMsg(e.message || 'Error al guardar', 'error');
    } finally {
      btn.disabled = false;
      btn.classList.remove('saving');
    }
  }

  function setMsg(text, type) {
    const el = document.getElementById('saveMsg');
    if (!el) return;
    el.textContent = text;
    el.className   = `save-msg ${type}`;
  }

  function esc(str) {
    return String(str ?? '')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
